version: "3.8"

services:

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root

    ports:
      - "8080:8080"
      - "50000:50000"

    environment:
      - TZ=Asia/Jerusalem

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    restart: unless-stopped

    networks:
      - ci-network


  app:
    build: .
    container_name: fastapi-app

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    environment:
      - PYTHONUNBUFFERED=1

    restart: unless-stopped

    networks:
      - ci-network


volumes:
  jenkins_home:

networks:
  ci-network: